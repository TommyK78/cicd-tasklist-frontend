# Identté du projet dans SonarQube
sonar.projectKey=cicd-tasklist-frontend
sonar.projectName=TaskList Frontend
sonar.projectVersion=1.0.0

# Sources et tests
sonar.sources=src
sonar.tests=src/__tests__
sonar.test.inclusions=src/__tests__/**/*.ts,src/__tests__/**/*.tsx

# Exclusions de l'analyse (fichiers générés / non pertinents)
sonar.exclusions=node_modules/**,dist/**,coverage/**,**/*.config.ts,src/main.tsx,src/vite-env.d.ts

# Couverture de code (rapport LCOV généré par Vitest / v8)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
# Exclure les tests du calcul de couverture
sonar.coverage.exclusions=src/__tests__/**,src/main.tsx

# Encodage des sources
sonar.sourceEncoding=UTF-8
