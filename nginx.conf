server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression basique des assets statiques
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Application SPA : toutes les routes inconnues renvoient index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long pour les assets versionnés produits par Vite
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
